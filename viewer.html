<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSI Document Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      background: #003366;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      height: 52px;
      flex-shrink: 0;
    }

    .toolbar .logo {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .toolbar .doc-title {
      font-size: 14px;
      opacity: 0.85;
    }

    .toolbar .close-btn {
      background: #cc0000;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .toolbar .close-btn:hover {
      background: #ff0000;
    }

    .viewer-container {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
    }

    iframe {
      width: 75%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .error {
      color: white;
      text-align: center;
      margin-top: 80px;
      font-size: 18px;
    }
  </style>
</head>
